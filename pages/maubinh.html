<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Mậu Binh - Chinese Poker 🀄</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../assets/icon-512.png">
    <link rel="apple-touch-icon" href="../assets/icon-512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/maubinh.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <div class="mb-topbar">
        <a href="../index.html" class="back-btn">← Menu</a>
        <div class="chips-display"><img src="../assets/economy/Economy_Cowoncy.png" class="economy-icon" style="width:16px; vertical-align:middle;"> <span id="mb-chips">0</span></div>
    </div>

    <div class="mb-game">
        <div class="mb-message" id="mb-message"><img src="../assets/economy/Economy_Cowoncy.png" class="economy-icon" style="width:14px; vertical-align:middle;"> Đặt cược và bắt đầu!</div>

        <!-- Bet Panel -->
        <div class="mb-panel" id="mb-bet-panel">
            <div class="mb-bet-inputs">
                <input type="number" id="mb-bet-input" value="100" min="10" step="10">
                <button id="mb-max-btn" class="mb-btn-small">MAX</button>
            </div>
            <button class="mb-btn mb-btn-primary" onclick="MauBinhUI.startGame()">BẮT ĐẦU</button>
        </div>

        <!-- Chi rows -->
        <div class="mb-chi-row" id="mb-front"></div>
        <div class="mb-chi-row" id="mb-middle"></div>
        <div class="mb-chi-row" id="mb-back"></div>

        <!-- Chi add buttons -->
        <div class="mb-chi-btns" id="mb-arrange-panel" style="display:none;">
            <button class="mb-btn mb-btn-secondary" onclick="MauBinhUI.addToChi('front')">↑ Front</button>
            <button class="mb-btn mb-btn-secondary" onclick="MauBinhUI.addToChi('middle')">→ Middle</button>
            <button class="mb-btn mb-btn-secondary" onclick="MauBinhUI.addToChi('back')">↓ Back</button>
            <button class="mb-btn mb-btn-success" onclick="MauBinhUI.autoArrange()">🤖 Tự Xếp</button>
            <button class="mb-btn mb-btn-primary" onclick="MauBinhUI.confirm()">✅ XÁC NHẬN</button>
        </div>

        <!-- Hand -->
        <div class="mb-hand" id="mb-hand"></div>

        <!-- Result Panel -->
        <div class="mb-panel" id="mb-result-panel" style="display:none;">
            <button class="mb-btn mb-btn-primary" onclick="MauBinhUI.newRound()">🔄 VÁN MỚI</button>
        </div>
        <div id="mb-result-detail"></div>
    </div>

    <script src="../js/card.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/account.js"></script>
    <script src="../js/mp-poker.js"></script>
    <script src="../js/maubinh.js"></script>
</body>
</html>
