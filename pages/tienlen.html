<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Game đánh bài Tiến Lên Miền Nam - Chơi ngay trên trình duyệt!">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tiến Lên Miền Nam 🃏</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../assets/icon-512.png">
    <link rel="apple-touch-icon" href="../assets/icon-512.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/orientation.css">
    <link rel="stylesheet" href="../css/betting.css">
    <script src="../js/orientation.js" defer></script>
    
    <!-- Socket.IO for MP -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
</head>
<body>



    <!-- Back to Menu -->
    <a href="../index.html" class="back-btn">← Menu</a>


    <!-- Message toast (now inside center-area below) -->


    <!-- Game Table -->
    <div class="game-container">

        <!-- North -->
        <div id="north-area" class="player-area">
            <div class="player-label" id="north-name">🤖 Đang đợi...</div>
            <div id="north-hand"></div>
        </div>

        <!-- West -->
        <div id="west-area" class="player-area">
            <div class="player-label" id="west-name">🤖 Đang đợi...</div>
            <div id="west-hand"></div>
        </div>

        <!-- Center Play Area -->
        <div id="center-area">
            <!-- Turn Indicator inside the center field -->
            <div id="turn-indicator" class="turn-indicator">🃏 Đang chia bài...</div>
            <div id="turn-timer" class="turn-timer"><div id="turn-timer-bar"></div></div>

            <!-- Message toast -->
            <div id="message"></div>

            <!-- Message toast -->
            <div id="message"></div>

            <div id="play-area">
                <div id="play-area-cards"></div>
            </div>
        </div>

        <!-- East -->
        <div id="east-area" class="player-area">
            <div class="player-label" id="east-name">🤖 Đang đợi...</div>
            <div id="east-hand"></div>
        </div>

        <!-- South (Human Player) -->
        <div id="south-area" class="player-area">
            <div class="player-label south-label" id="player-name">🙋 Bạn</div>
            <div id="player-hand"></div>
            <div class="controls">
                <div class="player-chips-container btn btn-secondary">
                    <img src="../assets/economy/Economy_Cowoncy.png" alt="Chips" class="economy-icon">
                    <span id="account-chips-val" class="player-chips-val">0</span>
                </div>
                <button id="btn-play" class="btn btn-play" title="Đánh bài (Enter)">🃏 Đánh</button>
                <button id="btn-pass" class="btn btn-pass" title="Bỏ lượt (Esc)">⏭ Bỏ lượt</button>
                <button id="btn-hint" class="btn btn-secondary" title="Gợi ý (H)">💡 Gợi ý</button>
                <button id="btn-sound" class="btn btn-icon" title="Âm thanh">🔊</button>
            </div>
        </div>
    </div>

    <!-- Betting Overlay -->
    <div id="betting-overlay" class="premium-bet-overlay">
        <div class="premium-bet-card">
            <h2>💰 ĐẶT CƯỢC</h2>
            <p>Chọn mức cược để bắt đầu ván bài</p>
            
            <div class="bet-input-wrapper">
                <input type="number" id="bet-input" class="premium-input" value="100" min="100" max="250000">
                <button id="btn-max-bet" class="premium-max-btn">MAX</button>
            </div>

            <div class="quick-bets">
                <button class="premium-chip" data-value="100">100</button>
                <button class="premium-chip" data-value="1000">1K</button>
                <button class="premium-chip" data-value="10000">10K</button>
                <button class="premium-chip" data-value="250000">250K</button>
            </div>

            <button id="btn-start-game" class="premium-start-btn">BẮT ĐẦU</button>
        </div>
    </div>

    <!-- Game Over Overlay -->
    <div id="game-over-overlay" class="game-over-overlay">
        <div class="game-over-content">
            <div id="game-over-message"></div>
            <button id="btn-play-again" class="btn btn-play-again">🔄 Chơi lại</button>
        </div>
    </div>

    <!-- Emoji Reactions -->
    <button id="btn-emoji" title="Gửi cảm xúc">🤫</button>
    <div id="emoji-tray" class="emoji-tray" style="display: none;">
        <span>😂</span>
        <span>💪</span>
        <span>🧐</span>
        <span>🔥</span>
        <span>🤡</span>
    </div>

    <!-- Scripts (order matters) -->
    <script src="../js/card.js"></script>
    <script src="../js/rules.js"></script>
    <script src="../js/ai.js"></script>
    <script src="../js/audio.js"></script>
    <!-- Firebase SDKs (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/account.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/socket-tienlen.js"></script>
    <script src="../js/game.js"></script>

</body>
</html>
