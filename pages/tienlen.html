<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Game đánh bài Tiến Lên Miền Nam - chơi ngay trên trình duyệt.">
    <meta name="theme-color" content="#08120f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tiến Lên Miền Nam</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="icon" href="../assets/icon-512.png">
    <link rel="apple-touch-icon" href="../assets/icon-512.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/orientation.css">
    <link rel="stylesheet" href="../css/betting.css">
    <script src="../js/orientation.js" defer></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <a href="../index.html" class="back-btn">← Menu</a>
    <div id="room-meta" class="room-meta" hidden></div>

    <div class="table-ambience" aria-hidden="true">
        <div class="ambient ambient-a"></div>
        <div class="ambient ambient-b"></div>
        <div class="ambient ambient-c"></div>
    </div>

    <div class="game-container">
        <div class="table-shell" aria-hidden="true">
            <div class="table-surface">
                <div class="table-center-glow"></div>
                <div class="table-decor top"></div>
                <div class="table-decor bottom"></div>
            </div>
        </div>

        <div id="north-area" class="player-area">
            <div class="player-label" id="north-name">Dealer Bắc <span id="north-count" class="card-count">0</span></div>
            <div id="north-hand"></div>
        </div>

        <div id="west-area" class="player-area">
            <div class="player-label" id="west-name">Dealer Tây <span id="west-count" class="card-count">0</span></div>
            <div id="west-hand"></div>
        </div>

        <div id="center-area">
            <div class="table-hud">
                <div class="table-title-wrap">
                    <div class="table-kicker">VIP TABLE</div>
                    <h1 class="table-title">Tien Len Royale</h1>
                </div>
                <div class="table-stats">
                    <div class="table-stat">
                        <span class="label">Pot</span>
                        <strong id="pot-amount">0</strong>
                    </div>
                    <div class="table-stat">
                        <span class="label">Bet</span>
                        <strong id="bet-amount">0</strong>
                    </div>
                </div>
            </div>

            <div class="table-center-zone">
                <div id="table-deck" class="table-deck">
                    <span class="deck-card deck-card-back back-1"></span>
                    <span class="deck-card deck-card-back back-2"></span>
                    <span class="deck-card deck-card-back back-3"></span>
                    <span class="deck-card deck-card-front"></span>
                </div>
                <div id="table-pot" class="table-pot">
                    <div class="pot-label">Central Pot</div>
                    <div class="pot-value"><span id="pot-display">0</span> chips</div>
                </div>
            </div>

            <div id="turn-indicator" class="turn-indicator">Đang chia bài...</div>
            <div id="turn-timer" class="turn-timer"><div id="turn-timer-bar"></div></div>
            <div id="message"></div>

            <div id="play-area">
                <div id="play-area-cards"></div>
            </div>

            <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>
        </div>

        <div id="east-area" class="player-area">
            <div class="player-label" id="east-name">Dealer Đông <span id="east-count" class="card-count">0</span></div>
            <div id="east-hand"></div>
        </div>

        <div id="south-area" class="player-area">
            <div class="player-label south-label" id="player-name">Bạn <span id="player-count" class="card-count">0</span></div>
            <div id="player-hand"></div>
            <div class="controls">
                <div class="player-chips-container btn btn-secondary">
                    <img src="../assets/economy/Economy_Cowoncy.png" alt="Chips" class="economy-icon">
                    <span id="account-chips-val" class="player-chips-val">0</span>
                </div>
                <button id="btn-play" class="btn btn-play" title="Đánh bài (Enter)">Đánh</button>
                <button id="btn-pass" class="btn btn-pass" title="Bỏ lượt (Esc)">Bỏ lượt</button>
                <button id="btn-hint" class="btn btn-secondary" title="Gợi ý (H)">Gợi ý</button>
                <button id="btn-sound" class="btn btn-icon" title="Âm thanh">🔊</button>
            </div>
        </div>
    </div>

    <div id="betting-overlay" class="premium-bet-overlay">
        <div class="premium-bet-card">
            <h2>💰 ĐẶT CƯỢC</h2>
            <p>Chọn mức cược để bắt đầu ván bài</p>

            <div class="bet-input-wrapper">
                <input type="number" id="bet-input" class="premium-input" value="100" min="100" max="250000">
                <button id="btn-max-bet" class="premium-max-btn">MAX</button>
            </div>

            <div class="quick-bets">
                <button class="premium-chip" data-value="100">100</button>
                <button class="premium-chip" data-value="1000">1K</button>
                <button class="premium-chip" data-value="10000">10K</button>
                <button class="premium-chip" data-value="250000">250K</button>
            </div>

            <button id="btn-start-game" class="premium-start-btn">BẮT ĐẦU</button>
            <a href="../index.html" class="premium-back-btn">← TRỞ VỀ MENU</a>
        </div>
    </div>

    <div id="game-over-overlay" class="game-over-overlay">
        <div class="game-over-content">
            <div id="game-over-message"></div>
            <button id="btn-play-again" class="btn btn-play-again">Chơi lại</button>
        </div>
    </div>

    <button id="btn-emoji" title="Gửi cảm xúc">🤫</button>
    <div id="emoji-tray" class="emoji-tray" style="display: none;">
        <span>😂</span>
        <span>💪</span>
        <span>🧐</span>
        <span>🔥</span>
        <span>🤡</span>
    </div>

    <script src="../js/card.js"></script>
    <script src="../js/rules.js"></script>
    <script src="../js/ai.js"></script>
    <script src="../js/audio.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/account.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/socket-tienlen.js"></script>
    <script src="../js/game.js"></script>
</body>
</html>
