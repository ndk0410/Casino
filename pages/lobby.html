<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sảnh Chờ - Coca Casino</title>
    <link rel="stylesheet" href="../css/lobby.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
    <div class="lobby-container">
        <!-- Step 1: Selection -->
        <div id="lobby-selection">
            <div class="lobby-header">
                <h1>Sảnh Chờ</h1>
                <p style="color:#888; font-size:14px; margin-top:5px;">Chơi cùng bạn bè</p>
            </div>

            <div class="lobby-tabs">
                <button class="tab-btn active" onclick="switchTab('create')">Tạo Phòng</button>
                <button class="tab-btn" onclick="switchTab('join')">Vào Phòng</button>
            </div>

            <!-- Create Form -->
            <div id="form-create" class="form-group active">
                <label style="font-size:12px; color:#b8b7b7;">Chọn trò chơi</label>
                <select id="create-game-type">
                    <option value="tienlen">Tiến Lên Miền Nam</option>
                    <option value="xidach">Xì Dách (Coming Soon)</option>
                    <option value="roulette">Roulette 🎡</option>
                    <option value="poker">Poker Texas Hold'em ♠</option>
                    <option value="maubinh">Mậu Binh 🀄</option>
                    <option value="bala">Ba Lá 🃏</option>
                </select>
                <button class="primary-btn" onclick="createRoom()">TẠO PHÒNG MỚI</button>
            </div>

            <!-- Join Form -->
            <div id="form-join" class="form-group">
                <input type="text" id="join-room-id" placeholder="Nhập mã phòng (6 ký tự)" maxlength="6" style="text-transform: uppercase; text-align:center; font-family:monospace; font-size:24px;">
                <button class="primary-btn" onclick="joinRoom()">VÀO PHÒNG</button>
            </div>

            <a href="../index.html" class="back-to-lobby">← Quay lại Menu</a>
        </div>

        <!-- Step 2: In Room -->
        <div id="lobby-room-view" class="room-view">
            <div class="lobby-header">
                <h1 id="view-game-name">Tiến Lên</h1>
                <div style="margin-top:10px;">
                    <span style="font-size:12px; color:#aaa;">Mã phòng:</span>
                    <div class="room-id-box" id="view-room-id">------</div>
                </div>
            </div>

            <div class="player-list" id="view-player-list">
                <!-- Players will be injected here -->
            </div>

            <div id="host-controls" style="display:none;">
                <button class="primary-btn" id="start-btn" onclick="startGame()">BẮT ĐẦU VÁN CHƠI</button>
                <p style="text-align:center; font-size:12px; color:#888; margin-top:10px;">Cần tối thiểu 2 người để bắt đầu</p>
            </div>
            
            <div id="guest-waiting" style="display:none; text-align:center; color:var(--gold); font-weight:bold;">
                ĐANG ĐỢI CHỦ PHÒNG BẮT ĐẦU...
            </div>

            <button class="back-to-lobby" style="background:none; border:none; width:100%; cursor:pointer;" onclick="leaveRoom()">Rời khỏi phòng</button>
        </div>
    </div>

    <script src="../js/account.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="../js/app-shell.js"></script>
    <script src="../js/lobby.js"></script>
</body>
</html>
